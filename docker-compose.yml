services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_assistant
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin123!@#"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  personalassistantapi:
    image: personalassistantapi
    container_name: personal_assistant_api
    build:
      context: .
      dockerfile: PersonalAssistantApi/Dockerfile
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PersonalAssistantDb;User Id=sa;Password=Admin123!@#;TrustServerCertificate=True"
    ports:
      - "5000:8080"
    restart: always

volumes:
  sql_data:
